<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>muthii 22 🖤</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
text-align:center;
background:linear-gradient(135deg,#000000,#3b0000,#8b0000);
color:white;
overflow-x:hidden;
}

.page{
display:none;
padding:40px 20px 120px;
min-height:100vh;
}

.active{
display:block;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:40px;
letter-spacing:2px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff004c,#ff4d6d);
color:white;
cursor:pointer;
margin:15px;
transition:0.3s;
box-shadow:0 0 15px rgba(255,0,76,0.6);
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px rgba(255,0,76,1);
}

#message{
font-size:20px;
margin-top:30px;
white-space:pre-line;
line-height:2.2;
max-width:900px;
margin:auto;
background:rgba(0,0,0,0.4);
padding:30px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,0,76,0.4);
}
</style>
</head>
<body>

<div class="page active" id="start">
<h1>muthii 22 🖤</h1>
<p>جاهزة للاختبار؟ 😏</p>
<button onclick="nextPage('q1')">ابدأ</button>
</div>

<div class="page" id="q1">
<h2>السؤال 1</h2>
<p>أنا أحبك أكثر من أي شي في الدنيا؟</p>
<button onclick="answer(true, 'q2')">صح</button>
<button onclick="answer(false)">غلط</button>
</div>

<div class="page" id="q2">
<h2>السؤال 2</h2>
<p>أنتي أهم شخص في حياتي؟</p>
<button onclick="answer(true, 'q3')">صح</button>
<button onclick="answer(false)">غلط</button>
</div>

<div class="page" id="q3">
<h2>السؤال 3</h2>
<p>مستحيل أخليك تفلتين مني؟ 😏</p>
<button onclick="answer(true, 'success')">صح</button>
<button onclick="answer(false)">غلط</button>
</div>

<div class="page" id="success">
<h2>كلهم صح 🔥</h2>
<button onclick="nextPage('challenge')">نروح للتحدي</button>
</div>

<div class="page" id="challenge">
<h2>التحدي 😈</h2>
<p>
في المكان الي نحن فيه الحين أنا مخبي ورقه…  
ولازم تحصليها 👀
</p>
<button onclick="nextPage('big')">نعم حصلتها 🖤</button>
</div>

<div class="page" id="big">
<h2>جاهزة للشي الكبير؟ 😌🔥</h2>
<button onclick="showFinal()">أكيد</button>
</div>

<div class="page" id="final">
<h1>muthii 22 🖤</h1>
<div id="message"></div>
</div>

<script>
function nextPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
window.scrollTo(0,0);
}

function answer(correct, next){
if(correct){
nextPage(next);
}else{
alert("غلط 😏 جربي مرة ثانية");
}
}

let text = `كل عام 
وانتي بخير وبصحه وسلامه والعمر كله.

اكملتي ٢٢ عام من عمرش لكن لو بتسألي عمري كم بقولش من لما حبيتش.

كل سنه وانتي احلا سنين يا زهره مارس،
وأنتي الزهره الي تحلي البستان وتعطيه الجمال.

اتمنى لش سنه جميله ومليئه بالافراح
وصدقيني من جانبي راح اخليها احلا واحلا من كل السنين..

العمر كله يارب ونكبر مع بعض ونعيش احلا ايامنا
واحتفل بكل سنينش ان شاء الله.

احتفظي بهالشي البسيط
يمكن يوم من الايام بتجلسي تشوفيه وتفرحي
وتعرفي في انسان يحبش ويحاول يستغل مواهبه وجهده وعمله لصالحش.

كل عام وانتي بخير وبصحه وسلامه ياعمري
والعمر كله يارب ياسنيني 🖤

واذا تريدي هديتش عطيني عكس الكف 😏🖤
`;

let i=0;
function showFinal(){
nextPage('final');
typeWriter();
}

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,35);
}
}
</script>

</body>
</html>
